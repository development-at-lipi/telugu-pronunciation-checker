<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telugu Pronunciation Checker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: #fff;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        h1 {
            text-align: center;
            font-size: 2rem;
            margin: 20px 0;
            background: linear-gradient(90deg, #f093fb, #f5576c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            text-align: center;
            color: #aaa;
            margin-bottom: 30px;
        }

        /* Category Tabs */
        .tabs {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 25px;
        }

        .tab {
            padding: 10px 24px;
            border: 2px solid #555;
            border-radius: 25px;
            background: transparent;
            color: #ccc;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .tab:hover {
            border-color: #f093fb;
            color: #f093fb;
        }

        .tab.active {
            background: linear-gradient(90deg, #f093fb, #f5576c);
            border-color: transparent;
            color: #fff;
        }

        /* Letter Grid */
        .letter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
            gap: 10px;
            margin-bottom: 30px;
        }

        .letter-card {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            font-size: 1.6rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .letter-card:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: #f093fb;
            transform: scale(1.05);
        }

        .letter-card.selected {
            background: rgba(240, 147, 251, 0.2);
            border-color: #f093fb;
            box-shadow: 0 0 15px rgba(240, 147, 251, 0.3);
        }

        .letter-card.passed {
            border-color: #00e676;
            background: rgba(0, 230, 118, 0.15);
        }

        .letter-card.failed {
            border-color: #ff5252;
            background: rgba(255, 82, 82, 0.15);
        }

        .letter-grid.words-grid {
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
        }

        .letter-grid.words-grid .letter-card {
            aspect-ratio: auto;
            padding: 15px 10px;
            font-size: 1.2rem;
        }

        /* Practice Section */
        .practice-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            margin-bottom: 20px;
            display: none;
        }

        .practice-section.visible {
            display: block;
        }

        .current-letter {
            font-size: 5rem;
            margin: 20px 0;
            color: #f093fb;
        }

        .current-letter.word-mode {
            font-size: 2.5rem;
        }

        .instruction {
            color: #aaa;
            margin-bottom: 20px;
            font-size: 1.1rem;
        }

        /* Record Button */
        .record-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 4px solid #f5576c;
            background: transparent;
            cursor: pointer;
            position: relative;
            margin: 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .record-btn::before {
            content: '';
            width: 30px;
            height: 30px;
            background: #f5576c;
            border-radius: 50%;
            transition: all 0.3s;
        }

        .record-btn.recording {
            border-color: #ff1744;
            animation: pulse 1.5s infinite;
        }

        .record-btn.recording::before {
            width: 24px;
            height: 24px;
            border-radius: 4px;
            background: #ff1744;
        }

        .record-btn:hover {
            transform: scale(1.05);
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 23, 68, 0.4); }
            70% { box-shadow: 0 0 0 20px rgba(255, 23, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 23, 68, 0); }
        }

        .record-label {
            color: #aaa;
            margin-top: 8px;
            font-size: 0.9rem;
        }

        /* Status */
        .status {
            margin: 15px 0;
            font-size: 1rem;
            min-height: 24px;
        }

        .status.processing {
            color: #ffc107;
        }

        /* Result */
        .result-box {
            margin-top: 20px;
            padding: 20px;
            border-radius: 15px;
            display: none;
        }

        .result-box.visible {
            display: block;
        }

        .result-box.pass {
            background: rgba(0, 230, 118, 0.1);
            border: 2px solid #00e676;
        }

        .result-box.fail {
            background: rgba(255, 82, 82, 0.1);
            border: 2px solid #ff5252;
        }

        .result-icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .result-text {
            font-size: 1.3rem;
            font-weight: bold;
        }

        .result-detail {
            color: #aaa;
            margin-top: 8px;
            font-size: 0.95rem;
        }

        .score-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            margin-top: 15px;
            overflow: hidden;
        }

        .score-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.5s ease;
        }

        .score-fill.good {
            background: linear-gradient(90deg, #00e676, #69f0ae);
        }

        .score-fill.ok {
            background: linear-gradient(90deg, #ffc107, #ffca28);
        }

        .score-fill.bad {
            background: linear-gradient(90deg, #ff5252, #ff8a80);
        }

        /* Progress */
        .progress-section {
            text-align: center;
            margin: 20px 0;
            color: #aaa;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            margin-top: 8px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #f093fb, #f5576c);
            border-radius: 3px;
            transition: width 0.5s ease;
        }

        /* Next button */
        .next-btn {
            margin-top: 15px;
            padding: 10px 30px;
            border: none;
            border-radius: 25px;
            background: linear-gradient(90deg, #f093fb, #f5576c);
            color: #fff;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            display: none;
        }

        .next-btn.visible {
            display: inline-block;
        }

        .next-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(240, 147, 251, 0.4);
        }

        /* Loading spinner */
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid #ffc107;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Retry hint */
        .retry-hint {
            color: #888;
            font-size: 0.85rem;
            margin-top: 10px;
        }

        @media (max-width: 600px) {
            .letter-grid {
                grid-template-columns: repeat(auto-fill, minmax(55px, 1fr));
                gap: 8px;
            }
            .letter-card {
                font-size: 1.3rem;
            }
            .current-letter {
                font-size: 3.5rem;
            }
            h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Telugu Pronunciation Checker</h1>
        <p class="subtitle">Select a letter or word, then record your pronunciation</p>

        <!-- Category Tabs -->
        <div class="tabs">
            <button class="tab active" data-category="vowels">Vowels (అచ్చులు)</button>
            <button class="tab" data-category="consonants">Consonants (హల్లులు)</button>
            <button class="tab" data-category="words">Words (పదాలు)</button>
        </div>

        <!-- Letter Grid -->
        <div id="letterGrid" class="letter-grid"></div>

        <!-- Progress -->
        <div class="progress-section">
            <span id="progressText">0 / 0 completed</span>
            <div class="progress-bar">
                <div id="progressFill" class="progress-fill" style="width: 0%"></div>
            </div>
        </div>

        <!-- Practice Section -->
        <div id="practiceSection" class="practice-section">
            <p class="instruction">Pronounce this letter clearly:</p>
            <div id="currentLetter" class="current-letter"></div>

            <div>
                <button id="recordBtn" class="record-btn" title="Click to record"></button>
                <p id="recordLabel" class="record-label">Tap to record</p>
            </div>

            <p id="status" class="status"></p>

            <!-- Result Box -->
            <div id="resultBox" class="result-box">
                <div id="resultIcon" class="result-icon"></div>
                <div id="resultText" class="result-text"></div>
                <div id="resultDetail" class="result-detail"></div>
                <div class="score-bar">
                    <div id="scoreFill" class="score-fill" style="width: 0%"></div>
                </div>
                <p class="retry-hint" id="retryHint"></p>
            </div>

            <button id="nextBtn" class="next-btn" onclick="goToNext()">Next Letter →</button>
        </div>
    </div>

    <script>
        const API_BASE = '';
        let currentCategory = 'vowels';
        let letters = [];
        let currentIndex = -1;
        let completedLetters = new Set();
        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;
        let recordingTimeout = null;

        // DOM elements
        const letterGrid = document.getElementById('letterGrid');
        const practiceSection = document.getElementById('practiceSection');
        const currentLetterEl = document.getElementById('currentLetter');
        const recordBtn = document.getElementById('recordBtn');
        const recordLabel = document.getElementById('recordLabel');
        const statusEl = document.getElementById('status');
        const resultBox = document.getElementById('resultBox');
        const resultIcon = document.getElementById('resultIcon');
        const resultText = document.getElementById('resultText');
        const resultDetail = document.getElementById('resultDetail');
        const scoreFill = document.getElementById('scoreFill');
        const nextBtn = document.getElementById('nextBtn');
        const progressText = document.getElementById('progressText');
        const progressFill = document.getElementById('progressFill');
        const retryHint = document.getElementById('retryHint');

        // Load letters for category
        async function loadLetters(category) {
            currentCategory = category;
            completedLetters = new Set();

            try {
                const res = await fetch(`${API_BASE}/api/letters?category=${category}`);
                const data = await res.json();
                letters = data.letters;
                renderGrid();
                updateProgress();
                practiceSection.classList.remove('visible');
            } catch (err) {
                console.error('Failed to load letters:', err);
            }
        }

        // Render letter grid
        function renderGrid() {
            letterGrid.className = `letter-grid${currentCategory === 'words' ? ' words-grid' : ''}`;
            letterGrid.innerHTML = letters.map((letter, i) => {
                let cls = 'letter-card';
                if (i === currentIndex) cls += ' selected';
                if (completedLetters.has(i)) cls += ' passed';
                return `<div class="${cls}" data-index="${i}" onclick="selectLetter(${i})">${letter}</div>`;
            }).join('');
        }

        // Select a letter to practice
        function selectLetter(index) {
            currentIndex = index;
            const letter = letters[index];

            currentLetterEl.textContent = letter;
            currentLetterEl.className = `current-letter${currentCategory === 'words' ? ' word-mode' : ''}`;

            practiceSection.classList.add('visible');
            resultBox.classList.remove('visible', 'pass', 'fail');
            nextBtn.classList.remove('visible');
            statusEl.textContent = '';
            retryHint.textContent = '';

            renderGrid();

            practiceSection.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        // Recording
        recordBtn.addEventListener('click', toggleRecording);

        async function toggleRecording() {
            if (isRecording) {
                stopRecording();
            } else {
                await startRecording();
            }
        }

        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        channelCount: 1,
                        sampleRate: 16000,
                        echoCancellation: true,
                        noiseSuppression: true
                    }
                });

                audioChunks = [];
                mediaRecorder = new MediaRecorder(stream, {
                    mimeType: MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
                        ? 'audio/webm;codecs=opus'
                        : 'audio/webm'
                });

                mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) audioChunks.push(e.data);
                };

                mediaRecorder.onstop = () => {
                    stream.getTracks().forEach(t => t.stop());
                    const blob = new Blob(audioChunks, { type: 'audio/webm' });
                    verifyPronunciation(blob);
                };

                mediaRecorder.start();
                isRecording = true;
                recordBtn.classList.add('recording');
                recordLabel.textContent = 'Recording... Tap to stop';
                statusEl.textContent = '';
                resultBox.classList.remove('visible', 'pass', 'fail');
                nextBtn.classList.remove('visible');

                // Auto-stop after 5 seconds
                recordingTimeout = setTimeout(() => {
                    if (isRecording) stopRecording();
                }, 5000);

            } catch (err) {
                statusEl.textContent = 'Microphone access denied. Please allow microphone access.';
                statusEl.className = 'status';
                console.error(err);
            }
        }

        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                clearTimeout(recordingTimeout);
                mediaRecorder.stop();
                isRecording = false;
                recordBtn.classList.remove('recording');
                recordLabel.textContent = 'Tap to record';
            }
        }

        // Verify pronunciation via API
        async function verifyPronunciation(audioBlob) {
            statusEl.innerHTML = '<span class="spinner"></span> Analyzing pronunciation...';
            statusEl.className = 'status processing';

            const formData = new FormData();
            formData.append('audio', audioBlob, 'recording.webm');
            formData.append('expected', letters[currentIndex]);

            try {
                const res = await fetch(`${API_BASE}/api/verify`, {
                    method: 'POST',
                    body: formData
                });

                const data = await res.json();
                statusEl.textContent = '';

                if (data.error && !data.recognized) {
                    statusEl.textContent = data.error;
                    statusEl.className = 'status';
                    retryHint.textContent = 'Tip: Speak louder and closer to the microphone. Try again!';
                    resultBox.classList.add('visible', 'fail');
                    resultBox.classList.remove('pass');
                    resultIcon.textContent = '🔇';
                    resultText.textContent = 'Could not hear you';
                    resultDetail.textContent = 'Please try again with clearer pronunciation.';
                    scoreFill.style.width = '0%';
                    scoreFill.className = 'score-fill bad';
                    return;
                }

                showResult(data);

            } catch (err) {
                statusEl.textContent = 'Network error. Please check your connection.';
                statusEl.className = 'status';
                console.error(err);
            }
        }

        function showResult(data) {
            resultBox.classList.add('visible');

            const score = data.score || 0;

            if (data.pass) {
                resultBox.classList.add('pass');
                resultBox.classList.remove('fail');
                resultIcon.textContent = '✅';
                resultText.textContent = 'PASS - Great pronunciation!';
                retryHint.textContent = '';
                completedLetters.add(currentIndex);
                updateProgress();
                renderGrid();
                nextBtn.classList.add('visible');
            } else {
                resultBox.classList.add('fail');
                resultBox.classList.remove('pass');
                resultIcon.textContent = '❌';
                resultText.textContent = 'Try Again';
                retryHint.textContent = 'Tip: Speak the letter slowly and clearly. Hold the sound for 1-2 seconds.';
            }

            const recognized = data.recognized || 'Nothing detected';
            resultDetail.textContent = `You said: "${recognized}" | Expected: "${data.expected}" | Score: ${score}%`;

            if (data.reason) {
                resultDetail.textContent += ` | ${data.reason}`;
            }

            scoreFill.style.width = `${score}%`;
            if (score >= 70) scoreFill.className = 'score-fill good';
            else if (score >= 40) scoreFill.className = 'score-fill ok';
            else scoreFill.className = 'score-fill bad';
        }

        function goToNext() {
            let next = currentIndex + 1;
            // Skip completed ones, wrap around
            let attempts = 0;
            while (completedLetters.has(next) && attempts < letters.length) {
                next = (next + 1) % letters.length;
                attempts++;
            }
            if (attempts >= letters.length) {
                statusEl.textContent = 'Congratulations! You completed all letters in this category!';
                nextBtn.classList.remove('visible');
                return;
            }
            selectLetter(next % letters.length);
        }

        function updateProgress() {
            const total = letters.length;
            const done = completedLetters.size;
            progressText.textContent = `${done} / ${total} completed`;
            progressFill.style.width = `${total > 0 ? (done / total) * 100 : 0}%`;
        }

        // Tab switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                loadLetters(tab.dataset.category);
            });
        });

        // Initialize
        loadLetters('vowels');
    </script>
</body>
</html>
